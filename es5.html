<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>WhatLang interpreter (ES5)</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <textarea id="codebox" spellcheck="false" placeholder="code">`Hello, world!`</textarea>
  <div>
    <button id="run" type="button" onclick="alert('Interpreter not loaded yet. if you keep seeing this, support for your browser may be broken.')">Run ¿</button>
    <small>(F5)</small>
  </div>
  <pre id="output">out</pre>
  <script>
    if (typeof Array.prototype.at !== "function") {
      Object.defineProperty(Array.prototype, "at", {
        configurable: true,
        writable: true,
        value: function at(index) {
          index = index | 0
          if (index < 0) index += this.length
          if (index < 0 || index >= this.length) return undefined
          return this[index]
        },
      })
    }
  </script>
  <script src="https://fastly.jsdelivr.net/npm/fast-text-encoding@1.0.6"></script>
  <script src="es5.js"></script>
</body>
</html>
